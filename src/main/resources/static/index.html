<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Recipe Suggestor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 1.2rem; font-weight: 600; color: #f1f5f9; }
        header span { font-size: 0.8rem; color: #64748b; }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            width: 300px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }
        .sidebar h3 { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }

        .upload-area {
            border: 2px dashed #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s;
        }
        .upload-area:hover { border-color: #6366f1; }
        .upload-area input { display: none; }
        .upload-area p { font-size: 0.85rem; color: #64748b; margin-top: 8px; }

        .btn {
            width: 100%;
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: opacity .2s;
        }
        .btn:hover { opacity: .85; }
        .btn-primary  { background: #6366f1; color: #fff; }
        .btn-danger   { background: #ef4444; color: #fff; }
        .btn-secondary{ background: #334155; color: #e2e8f0; }

        .status-box {
            background: #0f172a;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.8rem;
        }
        .status-box div { display: flex; justify-content: space-between; padding: 3px 0; }
        .status-box span:last-child { color: #6366f1; font-weight: 600; }

        .sources-panel { font-size: 0.78rem; }
        .source-item {
            background: #0f172a;
            border-left: 3px solid #6366f1;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 0 4px 4px 0;
        }
        .source-item .src-name { color: #a5b4fc; font-weight: 600; }
        .source-item .src-score { color: #64748b; float: right; }
        .source-item .src-excerpt { color: #94a3b8; margin-top: 4px; line-height: 1.4; }

        /* ---- Chat area ---- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg { display: flex; gap: 10px; max-width: 80%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.assistant { align-self: flex-start; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 0.9rem;
        }
        .user .msg-bubble    { background: #6366f1; color: #fff; border-radius: 12px 12px 2px 12px; }
        .assistant .msg-bubble { background: #1e293b; color: #e2e8f0; border-radius: 12px 12px 12px 2px; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .user .msg-avatar      { background: #4f46e5; color: #fff; }
        .assistant .msg-avatar { background: #0f172a; color: #a5b4fc; border: 1px solid #334155; }

        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #64748b;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%           { transform: translateY(-6px); }
        }

        .input-row {
            padding: 16px 24px;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            padding: 10px 14px;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }
        #messageInput:focus { border-color: #6366f1; }
        #sendBtn {
            padding: 10px 20px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        #sendBtn:disabled { opacity: .5; cursor: not-allowed; }

        .rag-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 9999px;
            background: #064e3b;
            color: #34d399;
            margin-left: 8px;
            vertical-align: middle;
        }
        .no-rag-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 9999px;
            background: #3f1f1f;
            color: #f87171;
            margin-left: 8px;
            vertical-align: middle;
        }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.875rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity .3s;
        }
        .toast.show  { opacity: 1; }
        .toast.ok    { background: #064e3b; color: #34d399; }
        .toast.error { background: #7f1d1d; color: #fca5a5; }

        .msg-bubble h1,
.msg-bubble h2,
.msg-bubble h3 {
    margin-top: 12px;
    margin-bottom: 8px;
}

.msg-bubble ul,
.msg-bubble ol {
    padding-left: 20px;
    margin: 10px 0;
}

.msg-bubble li {
    margin-bottom: 6px;
}

.msg-bubble p {
    margin-bottom: 10px;
    line-height: 1.6;
}
        /* ----------------------------------------
   STREAMING / THINKING INDICATOR
----------------------------------------- */

.typing-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
}

.typing-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
    animation: typing-bounce 1.3s infinite ease-in-out;
}

.typing-dot:nth-child(2) {
    animation-delay: 0.15s;
}

.typing-dot:nth-child(3) {
    animation-delay: 0.3s;
}

@keyframes typing-bounce {

    0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.5;
    }

    40% {
        transform: scale(1);
        opacity: 1;
    }
}
    </style>
</head>
<body>

<header>
    <div style="width:32px;height:32px;background:#6366f1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">🧠</div>
    <div>
        <h1>AI Recipe Suggestor</h1>
        <span>Spring AI · Hybrid RAG · Elasticsearch · Chat Memory</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;">
        <span id="convId" style="font-size:0.75rem;color:#475569;font-family:monospace;"></span>
        <button class="btn btn-secondary" style="width:auto;padding:6px 12px;" onclick="newConversation()">New Chat</button>
    </div>
</header>

<div class="main">

    <!-- Chat -->
    <div class="chat-area">
        <div id="messages">
            <div class="msg assistant">
                <div class="msg-avatar">🧠</div>
                <div class="msg-bubble">
                    Hello! I'm your AI Indian Recipe Suggestor. Ask me for indian recipes based on cuisine, ingredients, cooking time, or dietary preferences.
                </div>
            </div>
        </div>

        <div class="input-row">
            <textarea id="messageInput" rows="2"
                placeholder="Ask me for Indian recipes based on cuisine, ingredients, or cooking time… (Enter to send, Shift+Enter for newline)"
                onkeydown="handleKey(event)"></textarea>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let autoScroll = true;

const messages =
    document.getElementById('messages');

messages.addEventListener('scroll', () => {

    const threshold = 120;

    autoScroll =
        messages.scrollHeight -
        messages.scrollTop -
        messages.clientHeight
        < threshold;
});
    let conversationId = crypto.randomUUID();

    document.getElementById('convId').textContent =
        'ID: ' + conversationId.substring(0, 8) + '…';

    // --------------------------------------------------------
    // SEND MESSAGE
    // --------------------------------------------------------

    async function sendMessage() {

        const input = document.getElementById('messageInput');

        const text = input.value.trim();

        if (!text) return;

        input.value = '';

        appendMessage('user', text);

        const assistantBubble = appendStreamingAssistantMessage();

        document.getElementById('sendBtn').disabled = true;

        try {

            const response = await fetch('/api/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query: text,
                    conversationId: conversationId
                })
            });

            if (!response.ok) {

                appendToAssistantMessage(
                    assistantBubble,
                    '\n⚠️ Failed to fetch response'
                );

                return;
            }

            const reader = response.body.getReader();

            const decoder = new TextDecoder();

            let buffer = '';

            while (true) {

                const { value, done } = await reader.read();

                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');

                buffer = lines.pop();

                for (const line of lines) {

                    if (!line.startsWith('data:')) continue;

                    const json = line.replace('data:', '').trim();

                    if (!json) continue;

                    try {

                        const chunk = JSON.parse(json);

                        // ----------------------------------------
                        // CONTENT STREAM
                        // ----------------------------------------

                        if (chunk.type === 'CONTENT') {

                            appendToAssistantMessage(
                                assistantBubble,
                                chunk.content || ''
                            );
                        }

                        // ----------------------------------------
                        // CITATIONS
                        // ----------------------------------------

                        if (chunk.type === 'CITATIONS') {

                            renderCitations(
                                assistantBubble,
                                chunk.citations || []
                            );
                        }

                    } catch (e) {
                        console.error('Invalid SSE chunk', e);
                    }
                }
            }

        } catch (e) {

            appendToAssistantMessage(
                assistantBubble,
                '\n⚠️ Network error: ' + e.message
            );

        } finally {

            document.getElementById('sendBtn').disabled = false;
        }
    }

    // --------------------------------------------------------
    // USER MESSAGE
    // --------------------------------------------------------

    function appendMessage(role, text) {

        const msgs = document.getElementById('messages');

        const div = document.createElement('div');

        div.className = 'msg ' + role;

        const avatar = document.createElement('div');

        avatar.className = 'msg-avatar';

        avatar.textContent = role === 'user' ? '👤' : '🧠';

        const bubble = document.createElement('div');

        bubble.className = 'msg-bubble';

        bubble.textContent = text;

        div.appendChild(avatar);

        div.appendChild(bubble);

        msgs.appendChild(div);

        if (autoScroll) {
    msgs.scrollTop = msgs.scrollHeight;
}
    }

    // --------------------------------------------------------
    // STREAMING ASSISTANT MESSAGE
    // --------------------------------------------------------

    function appendStreamingAssistantMessage() {

        const msgs = document.getElementById('messages');

        const div = document.createElement('div');

        div.className = 'msg assistant';

        const avatar = document.createElement('div');

        avatar.className = 'msg-avatar';

        avatar.textContent = '🧠';

        const bubble = document.createElement('div');

        bubble.className = 'msg-bubble';

        bubble.innerHTML = `
    <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
    </div>

    <div class="streaming-content"></div>
`;
        div.appendChild(avatar);

        div.appendChild(bubble);

        msgs.appendChild(div);

        if (autoScroll) {
    msgs.scrollTop = msgs.scrollHeight;
}

        return bubble.querySelector('.streaming-content');
    }

    // --------------------------------------------------------
    // APPEND TOKENS
    // --------------------------------------------------------

    function appendToAssistantMessage(container, text) {

    // remove typing indicator once first token arrives
    const indicator =
        container.parentElement.querySelector(
            '.typing-indicator'
        );

    if (indicator) {
        indicator.remove();
    }

    // accumulate markdown
    container.dataset.raw =
        (container.dataset.raw || '') + text;

    // render markdown
    container.innerHTML =
        marked.parse(container.dataset.raw);

    const msgs = document.getElementById('messages');

    if (autoScroll) {
        msgs.scrollTop = msgs.scrollHeight;
    }
}

    // --------------------------------------------------------
    // RENDER CITATIONS
    // --------------------------------------------------------

    function renderCitations(container, citations) {

        if (!citations.length) return;

        const wrapper = document.createElement('div');

        wrapper.style.marginTop = '16px';

        wrapper.innerHTML = `
            <div style="
                font-size:0.75rem;
                color:#94a3b8;
                margin-bottom:10px;
                text-transform:uppercase;
                letter-spacing:.05em;
            ">
                Recipe Sources
            </div>
        `;

        citations.forEach(citation => {

            const card = document.createElement('div');

            card.style.background = '#0f172a';
            card.style.border = '1px solid #334155';
            card.style.borderRadius = '8px';
            card.style.padding = '10px';
            card.style.marginBottom = '8px';

            card.innerHTML = `
                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    margin-bottom:6px;
                ">
                    <div style="
                        font-weight:600;
                        color:#c7d2fe;
                        font-size:0.85rem;
                    ">
                        🍲 ${citation.title || 'Recipe'}
                    </div>

                    ${
                        citation.score
                        ? `
                            <div style="
                                font-size:0.72rem;
                                color:#64748b;
                            ">
                                ${(citation.score * 100).toFixed(0)}%
                            </div>
                        `
                        : ''
                    }
                </div>

                <a
                    href="${citation.sourceUrl}"
                    target="_blank"
                    style="
                        color:#818cf8;
                        font-size:0.78rem;
                        text-decoration:none;
                        word-break:break-all;
                    "
                >
                    ${citation.sourceUrl}
                </a>
            `;

            wrapper.appendChild(card);
        });

        container.parentElement.appendChild(wrapper);

        const msgs = document.getElementById('messages');

       if (autoScroll) {
    msgs.scrollTop = msgs.scrollHeight;
}
    }

    // --------------------------------------------------------
    // KEY HANDLING
    // --------------------------------------------------------

    function handleKey(e) {

        if (e.key === 'Enter' && !e.shiftKey) {

            e.preventDefault();

            sendMessage();
        }
    }

    // --------------------------------------------------------
    // NEW CONVERSATION
    // --------------------------------------------------------

    function newConversation() {

        conversationId = crypto.randomUUID();

        document.getElementById('convId').textContent =
            'ID: ' + conversationId.substring(0, 8) + '…';

        document.getElementById('messages').innerHTML = `
            <div class="msg assistant">
                <div class="msg-avatar">🧠</div>
                <div class="msg-bubble">
                    New recipe conversation started. Ask me for recipes, ingredients, cuisines, or cooking suggestions!
                </div>
            </div>
        `;
    }

    // --------------------------------------------------------
    // TOAST
    // --------------------------------------------------------

    function showToast(msg, type) {

        const t = document.getElementById('toast');

        t.textContent = msg;

        t.className = 'toast ' + type + ' show';

        setTimeout(() => t.classList.remove('show'), 3500);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
